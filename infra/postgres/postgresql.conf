# Skopos production tuning for CPX21 (4GB RAM, SSD, Postgres 16).
# Conservative profile — DB shares the box with FastAPI + Redis.

# ── Memory ──────────────────────────────────────────────────────────
# 25% of RAM is the classic recommendation, but we share the box.
shared_buffers = 512MB
effective_cache_size = 2GB

# Per-operation sort/hash. With pool max=50, worst-case 50 × 8MB = 400MB.
work_mem = 8MB
maintenance_work_mem = 128MB

# ── Connections ─────────────────────────────────────────────────────
# Matches what we sized in database.py (pool 20 + overflow 30 = 50,
# plus headroom for workers, alembic, psql, monitoring).
max_connections = 100

# ── WAL / checkpoint ────────────────────────────────────────────────
# Larger max_wal_size = fewer, bigger checkpoints = better throughput
# under write load. completion_target spreads I/O.
max_wal_size = 2GB
min_wal_size = 256MB
checkpoint_completion_target = 0.9
wal_buffers = 16MB

# ── SSD tuning ──────────────────────────────────────────────────────
# Default 4.0 assumes spinning disks. SSDs make random ≈ sequential.
random_page_cost = 1.1
effective_io_concurrency = 200

# ── Observability ───────────────────────────────────────────────────
# Log queries > 200ms so we can spot N+1s and missing indexes in prod.
log_min_duration_statement = 200
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 1MB

# ── Parallel query ──────────────────────────────────────────────────
# 4 vCPU box. Default 2 workers per gather is fine, but let scans use them.
max_parallel_workers_per_gather = 2
max_parallel_workers = 4

# ── Logical defaults kept ───────────────────────────────────────────

# ── Network (FIX 2026-06-24) ───────────────────────────────────────
listen_addresses = '*'
